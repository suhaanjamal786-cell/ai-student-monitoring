<!DOCTYPE html>
<html>
<head>
    <title>AI Student Safety Monitoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="login-box">

        <div class="icon">🛡️</div>

        <h1>AI STUDENT SAFETY</h1>

        <p>Administrator Login</p>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit" class="login-btn">
                LOGIN
            </button>

        </form>

    </div>

</body>
</html>
